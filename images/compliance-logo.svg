<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100" width="200" height="100">
  <!-- A clean, modern icon representing government/corporate compliance -->
  <rect width="200" height="100" fill="none"/>
  <g transform="translate(10, 10)">
    <!-- Shield / Emblem in Primary Blue -->
    <path d="M 90 5 L 140 25 L 140 55 C 140 75 90 90 90 90 C 90 90 40 75 40 55 L 40 25 Z" fill="#082d5a" />
    <!-- Inner Border in Gold -->
    <path d="M 90 12 L 132 29 L 132 55 C 132 70 90 83 90 83 C 90 83 48 70 48 55 L 48 29 Z" fill="#c8a951" />
    <!-- Checkmark inside shield -->
