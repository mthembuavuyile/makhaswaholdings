                /* ── Road Construction & Surfacing ── */
                { src: 'images/projects/roadsandsurfacing/makhaswa (10).jpeg', alt: 'Freshly laid asphalt surface stretching along a newly constructed road with red soil shoulders on either side', title: 'Asphalt Surfacing & Laying', category: 'roads' },

                { src: 'images/projects/roadsandsurfacing/makhaswa (53).jpeg', alt: 'Worker in PPE inspecting a concrete lined road channel during roadbed profiling and drainage operations', title: 'Roadbed Profiling Operations', category: 'roads' },

                { src: 'images/projects/roadsandsurfacing/makhaswa (61).jpeg', alt: 'Installation of interlocking block paving alongside road kerbing', title: 'Interlocking Block Paving', category: 'roads' },
                { src: 'images/projects/roadsandsurfacing/makhaswa (55).jpeg', alt: 'Constructed traffic roundabout with paved apron and concrete kerbing', title: 'Roundabout Construction & Paving', category: 'roads' },
                { src: 'images/projects/roadsandsurfacing/makhaswa (18).jpeg', alt: 'Road rollers compacting a newly surfaced road layer', title: 'Road Surfacing & Compaction', category: 'roads' },
                { src: 'images/projects/roadsandsurfacing/makhaswa (1).jpeg', alt: 'Roads & Surfacing project on site', title: 'Roads & Surfacing', category: 'roads' },
                { src: 'images/projects/roadsandsurfacing/makhaswa (6).jpeg', alt: 'Roads & Surfacing construction work', title: 'Roads & Surfacing', category: 'roads' },
                { src: 'images/projects/roadsandsurfacing/makhaswa (34).jpeg', alt: 'Roundabout with block paving apron', title: 'Roundabout with Block Paving Apron', category: 'roads' },
                { src: 'images/projects/roadsandsurfacing/makhaswa (33).jpeg', alt: 'Freshly laid asphalt road leading to a roundabout', title: 'Fresh Asphalt Road to Roundabout', category: 'roads' },
                { src: 'images/projects/roadsandsurfacing/makhaswa (54).jpeg', alt: 'Construction crew installing concrete kerbing on site', title: 'Concrete Kerbing Installation', category: 'roads' },

                /* ── Building Construction & Housing ── */
                { src: 'images/projects/buildingconstruction/makhaswa (49).jpeg', alt: 'Workers constructing a red brick wall using scaffolding on a construction site', title: 'Brick Wall Construction', category: 'building' },
                { src: 'images/projects/buildingconstruction/makhaswa (43).jpeg', alt: 'Workers preparing a large concrete foundation slab with steel reinforcement mesh', title: 'Foundation Slab Preparation', category: 'building' },
                { src: 'images/projects/buildingconstruction/makhaswa (48).jpeg', alt: 'Close-up of structural red brick wall and pillar construction with earthworks at the base', title: 'Structural Brickwork', category: 'building' },
                { src: 'images/projects/buildingconstruction/makhaswa (45).jpeg', alt: 'Long, completed face brick boundary wall constructed outdoors under a clear blue sky', title: 'Perimeter Brick Wall', category: 'building' },
                { src: 'images/aigenerated/concrete-panels.jpeg', alt: 'Precast concrete panel construction', title: 'Precast Concrete Panel Construction', category: 'building' },
                { src: 'images/projects/buildingconstruction/school.jpeg', alt: 'School building construction project', title: 'School Building Construction', category: 'building' },
                { src: 'images/projects/buildingconstruction/clinic.jpeg', alt: 'Rhiza Babuyile Clinic construction', title: 'Rhiza Babuyile Clinic', category: 'building' },
                { src: 'images/projects/buildingconstruction/house.jpeg', alt: 'House building construction project', title: 'House Building Construction', category: 'building' },
                { src: 'images/projects/buildingconstruction/makhaswa (46).jpeg', alt: 'Curved brick boundary wall on site', title: 'Curved Brick Boundary Wall', category: 'building' },
            ];

            const CATEGORY_LABELS = {
                all: 'All Projects',
                earthworks: 'Earthworks & Site Prep',
                civil: 'Civil Works',
                roads: 'Roads & Surfacing',
                building: 'Building Construction',
            };

            const ITEMS_PER_PAGE = 12;

            /* ── State ── */
            let activeFilter = 'all';
            let currentPage = 1;
            let filteredData = [];
            let lightboxIndex = 0; // index within filteredData on current page (used for lightbox across all filtered)
            let allFilteredImages = []; // flat array for lightbox navigation

            /* ── DOM refs ── */
            const grid = document.getElementById('gallery-grid');
            const pagination = document.getElementById('gallery-pagination');
            const countLabel = document.getElementById('gallery-count');
            const emptyState = document.getElementById('gallery-empty');
            const lightbox = document.getElementById('lightbox');
            const lbImg = document.getElementById('lightbox-img');
            const lbCap = document.getElementById('lightbox-caption');
            const lbCounter = document.getElementById('lightbox-counter');
            const lbClose = document.getElementById('lightbox-close-btn');
            const lbPrev = document.getElementById('lightbox-prev-btn');
            const lbNext = document.getElementById('lightbox-next-btn');

            /* ── Filter ── */
            function applyFilter(filter) {
                activeFilter = filter;
                currentPage = 1;
                filteredData = filter === 'all'
                    ? GALLERY_DATA
                    : GALLERY_DATA.filter(img => img.category === filter);
                allFilteredImages = filteredData;
                render();
            }

            /* ── Render grid + pagination ── */
            function render() {
                const total = filteredData.length;
                const totalPages = Math.ceil(total / ITEMS_PER_PAGE);
                const start = (currentPage - 1) * ITEMS_PER_PAGE;
                const pageItems = filteredData.slice(start, start + ITEMS_PER_PAGE);

                /* Count label */
                countLabel.textContent = total === 0
                    ? ''
                    : `Showing ${start + 1}–${Math.min(start + pageItems.length, total)} of ${total} photos`;

                /* Empty state */
                emptyState.style.display = total === 0 ? 'block' : 'none';
                grid.style.display = total === 0 ? 'none' : 'grid';

                /* Build grid items */
                grid.innerHTML = '';
                pageItems.forEach((img, i) => {
                    const globalIndex = start + i; // index in allFilteredImages

                    const item = document.createElement('div');
                    item.className = 'grid-item';
                    item.setAttribute('role', 'listitem');
                    item.setAttribute('tabindex', '0');
                    item.setAttribute('aria-label', img.title);
                    item.style.animationDelay = `${i * 0.04}s`;
                    item.dataset.globalIndex = globalIndex;

                    item.innerHTML = `
                    <img src="${img.src}" alt="${img.alt}" loading="lazy">
                    <div class="grid-item-caption">
                        <span class="caption-icon">&#128269;</span>
                        ${img.title}
                    </div>
                `;

                    item.addEventListener('click', () => openLightbox(globalIndex));
                    item.addEventListener('keydown', e => {
                        if (e.key === 'Enter' || e.key === ' ') {
                            e.preventDefault();
                            openLightbox(globalIndex);
                        }
                    });

                    grid.appendChild(item);
                });

                /* Build pagination */
                buildPagination(totalPages);
            }

            /* ── Pagination builder ── */
            function buildPagination(totalPages) {
                pagination.innerHTML = '';
                if (totalPages <= 1) return;

                const makeBtn = (label, page, isIcon = false) => {
                    const btn = document.createElement('button');
                    btn.className = 'page-btn' + (page === currentPage ? ' active' : '');
                    btn.setAttribute('aria-label', isIcon ? label : `Page ${page}`);
                    if (page === currentPage) btn.setAttribute('aria-current', 'page');
                    btn.innerHTML = isIcon ? label : page;
                    btn.disabled = (page < 1 || page > totalPages);
                    btn.addEventListener('click', () => {
                        currentPage = page;
                        render();
                        grid.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    });
                    return btn;
                };

                /* Prev arrow */
                const prevSVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>`;
                const prevBtn = makeBtn('Previous page', currentPage - 1, true);
                prevBtn.innerHTML = prevSVG;
                prevBtn.disabled = currentPage === 1;
                prevBtn.addEventListener('click', () => {
                    if (currentPage > 1) { currentPage--; render(); grid.scrollIntoView({ behavior: 'smooth', block: 'start' }); }
                });
                pagination.appendChild(prevBtn);

                /* Page number buttons — show max 5 around current */
                const range = pageRange(currentPage, totalPages);
                let lastPage = 0;
                range.forEach(p => {
                    if (p === '…') {
                        const ellipsis = document.createElement('span');
                        ellipsis.textContent = '…';
                        ellipsis.style.cssText = 'padding:0 4px;color:#aaa;align-self:center;font-size:13px;';
                        pagination.appendChild(ellipsis);
                    } else {
                        pagination.appendChild(makeBtn(p, p));
                    }
                    lastPage = p;
                });

                /* Next arrow */
                const nextSVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>`;
                const nextBtn = makeBtn('Next page', currentPage + 1, true);
                nextBtn.innerHTML = nextSVG;
                nextBtn.disabled = currentPage === totalPages;
                nextBtn.addEventListener('click', () => {
                    if (currentPage < totalPages) { currentPage++; render(); grid.scrollIntoView({ behavior: 'smooth', block: 'start' }); }
                });
                pagination.appendChild(nextBtn);
            }

            /* Returns array of page numbers/ellipses to show */
            function pageRange(current, total) {
                if (total <= 7) return Array.from({ length: total }, (_, i) => i + 1);
                const pages = [];
                pages.push(1);
                if (current > 3) pages.push('…');
                const start = Math.max(2, current - 1);
                const end = Math.min(total - 1, current + 1);
                for (let i = start; i <= end; i++) pages.push(i);
                if (current < total - 2) pages.push('…');
                pages.push(total);
                return pages;
            }

            /* ── Lightbox ── */
            function openLightbox(globalIndex) {
                lightboxIndex = globalIndex;
                updateLightbox();
                lightbox.classList.add('active');
                document.body.style.overflow = 'hidden';
                lbImg.focus();
            }

            function closeLightbox() {
                lightbox.classList.remove('active');
                document.body.style.overflow = '';
            }

            function showPrev(e) {
                if (e) e.stopPropagation();
                lightboxIndex = (lightboxIndex - 1 + allFilteredImages.length) % allFilteredImages.length;
                updateLightbox();
            }

            function showNext(e) {
                if (e) e.stopPropagation();
                lightboxIndex = (lightboxIndex + 1) % allFilteredImages.length;
                updateLightbox();
            }

            function updateLightbox() {
                const img = allFilteredImages[lightboxIndex];
                lbImg.src = img.src;
                lbImg.alt = img.alt;
                lbCap.textContent = img.title;
                lbCounter.textContent = `${lightboxIndex + 1} / ${allFilteredImages.length}`;
            }

            /* ── Event listeners ── */
            document.getElementById('gallery-filters').addEventListener('click', e => {
                const btn = e.target.closest('.filter-btn');
                if (!btn) return;
                document.querySelectorAll('.filter-btn').forEach(b => {
                    b.classList.remove('active');
                    b.setAttribute('aria-selected', 'false');
                });
                btn.classList.add('active');
                btn.setAttribute('aria-selected', 'true');
                applyFilter(btn.dataset.filter);
            });

            lbClose.addEventListener('click', closeLightbox);
            lbPrev.addEventListener('click', showPrev);
            lbNext.addEventListener('click', showNext);

            lightbox.addEventListener('click', e => {
                if (e.target === lightbox) closeLightbox();
            });

            document.addEventListener('keydown', e => {
                if (!lightbox.classList.contains('active')) return;
                if (e.key === 'Escape') closeLightbox();
                else if (e.key === 'ArrowLeft') showPrev();
                else if (e.key === 'ArrowRight') showNext();
            });

            /* Touch/swipe on lightbox */
            let touchStartX = 0;
            lightbox.addEventListener('touchstart', e => {
                touchStartX = e.changedTouches[0].screenX;
            }, { passive: true });
            lightbox.addEventListener('touchend', e => {
                const dx = e.changedTouches[0].screenX - touchStartX;
                if (Math.abs(dx) > 50) dx < 0 ? showNext() : showPrev();
            }, { passive: true });

            /* ── Boot ── */
            document.addEventListener('DOMContentLoaded', () => {
                applyFilter('all');
            });

            // If DOMContentLoaded already fired (script runs after DOM is ready)
            if (document.readyState !== 'loading') applyFilter('all');
        })();
    </script>
